<div class="relative">
  <input
    hlmInput
    type="text"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="onInput($event)"
    class="ps-10"
    [attr.aria-label]="'search.ariaLabel' | translate"
  />
  <ng-icon
    name="lucideSearch"
    class="pointer-events-none absolute start-3 top-1/2 -translate-y-1/2 text-muted-foreground"
    size="16"
    aria-hidden="true"
  />
</div>
