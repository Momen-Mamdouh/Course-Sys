<div class="mx-auto px-4 py-8 max-w-6xl">
  <div class="flex justify-between items-center mb-6">
    <h1 class="font-bold text-foreground text-2xl">{{ 'nav.courses' | translate }}</h1>
    <button hlmBtn (click)="onAdd()">
      <ng-icon name="lucidePlus" size="16" class="me-1" />
      {{ 'course.addCourse' | translate }}
    </button>
  </div>

  <div class="flex items-center gap-4 mb-4">
    <div class="flex-1">
      <app-search-input [value]="searchQuery()" (valueChange)="onSearch($event)"
        [placeholder]="'search.placeholder' | translate" />
    </div>

    <hlm-select [itemToString]="itemToString" [value]="selectedStatus()" (valueChange)="onStatusChange($event!)">
      <hlm-select-trigger class="w-56">
        <hlm-select-value [placeholder]="'course.table.status' | translate" />
      </hlm-select-trigger>

      <hlm-select-content *hlmSelectPortal>
        <hlm-select-group>
          <hlm-select-label>
            {{ 'course.table.status' | translate }}
          </hlm-select-label>

          @for (status of statuses; track status.value) {
          <hlm-select-item [value]="status.value">
            {{ status.key | translate }}
          </hlm-select-item>
          }
        </hlm-select-group>
      </hlm-select-content>
    </hlm-select>
  </div>

  @if (isLoading()) {
  <app-skeleton-table />
  } @else if (error()) {
  <app-error-state [title]="error()!.title" [message]="error()!.message" (retry)="loadCourses()" />
  } @else if (courses().length === 0) {
  <app-empty-state [title]="(searchQuery() ? 'empty.noMatching' : 'empty.noCourses') | translate"
    [message]="(searchQuery() ? 'empty.noMatchingMessage' : 'empty.noCoursesMessage') | translate"
    [actionLabel]="searchQuery() ? '' : ('course.addCourse' | translate)" (action)="onAdd()" />
  } @else {
  <app-course-table [courses]="courses()" (view)="onView($event)" (edit)="onEdit($event)" (delete)="onDelete($event)" />
  }
</div>

<app-confirmation-modal [visible]="showDeleteModal()" [title]="'confirm.deleteCourseTitle' | translate"
  [message]="'confirm.deleteCourseMessage' | translate : { courseName: deletingCourse()?.courseName || '' }"
  [confirmLabel]="'course.delete' | translate" [cancelLabel]="'action.cancel' | translate" (confirm)="onDeleteConfirm()"
  (cancel)="onDeleteCancel()" />
